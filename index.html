<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Previsão do Tempo</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-container">
      <div class="left-column">
        <header class="header-container">
          <img src="images/logo.svg" alt="Clima Hoje" />
          <input
            class="custom-input"
            type="text"
            name="city"
            id="city"
            placeholder="Procure por cidades"
          />
        </header>
        <div class="showcase-container">
          <div class="showcase-text">
            <h2>São Paulo</h2>
            <p>Chance de chuva: 0%</p>
            <h2>28°</h2>
          </div>
          <img src="images/sun-clouds-big.svg" alt="Sol com poucas nuvens" />
        </div>
        <div class="hourly-forecast-container">
          <div class="hour-weather-item">
            <p>6:00 AM</p>
            <img src="images/sun-clouds-6am.svg" alt="Sol com muita nuvem" />
            <p>24°</p>
          </div>
          <div class="hour-weather-item">
            <p>9:00 AM</p>
            <img src="images/sun-clouds-9am.svg" alt="sol com poucas nuvens" />
            <p>28°</p>
          </div>
          <div class="hour-weather-item">
            <p>12:00 PM</p>
            <img src="images/sun.svg" alt="Sol" />
            <p>30°</p>
          </div>
          <div class="hour-weather-item">
            <p>3:00 PM</p>
            <img src="images/sun.svg" alt="Sol" />
            <p>32°</p>
          </div>
          <div class="hour-weather-item">
            <p>6:00 PM</p>
            <img src="images/clouds.svg" alt="Nublado" />
            <p>27°</p>
          </div>
          <div class="hour-weather-item">
            <p>9:00 PM</p>
            <img src="images/moon-clouds.svg" alt="Noite com nuvens" />
            <p>26°</p>
          </div>
        </div>
      <div class="weather-details-container">
        <div class="weather-detail-item">
          <p>Sensação Térmica</p>
          <div>
            <img src="icons/thermometer.svg" alt="termometro de temperatura">
            <p>30°</p>
          </div>
        </div>
        <div class="weather-detail-item">
          <p>Chance de Chuva</p>
          <div>
            <img src="icons/drop.svg" alt="gota">
            <p>0%</p>
          </div>
        </div>
        <div class="weather-detail-item">
          <p>Vento</p>
          <div>
            <img src="icons/wind.svg" alt="vento">
            <p>2<span>km/h</span></p>
          </div>
        </div>
        <div class="weather-detail-item">
          <p>Índice UV</p>
          <div>
            <img src="icons/sun-icon.svg" alt="sol">
            <p>4</p>
          </div>
        </div>
      </div> 
      </div>
    </div>
  </body>
</html>
